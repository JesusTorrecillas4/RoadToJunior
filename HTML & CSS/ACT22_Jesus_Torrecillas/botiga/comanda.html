<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>MangaZone | Pedido</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="navbar">

  <a href="index.html" class="logo">
    MangaZone
  </a>

  <nav>
    <a href="index.html">Inicio</a>
    <a href="categoria.html">Mangas</a>
    <a href="carret.html">Carrito</a>
    <a href="comanda.html">Pedido</a>
  </nav>

</header>

<main class="section">

  <h1>Finalizar pedido</h1>

  <form class="formulario">

    <!-- DATOS -->

    <h2>Datos personales</h2>

    <div class="form-grid">

      <div>
        <label>Nombre</label>
        <input type="text" required>
      </div>

      <div>
        <label>Apellidos</label>
        <input type="text" required>
      </div>

      <div>
        <label>Email</label>
        <input type="email" required>
      </div>

      <div>
        <label>Teléfono</label>
        <input type="tel" required>
      </div>

    </div>

    <!-- DIRECCIÓN -->

    <h2>Dirección</h2>

    <div class="form-grid">

      <div>
        <label>Ciudad</label>
        <input type="text" required>
      </div>

      <div>
        <label>Código postal</label>
        <input type="text" pattern="[0-9]{5}" required>
      </div>

    </div>

    <!-- PROVINCIA -->

    <label>Provincia</label>

    <select required>

      <option value="">
        Selecciona provincia
      </option>

      <option>Barcelona</option>
      <option>Madrid</option>
      <option>Málaga</option>
      <option>Girona</option>
      

    </select>

    <!-- PAGO -->

    <h2>Método de pago</h2>

    <div class="radios">

      <label>
        <input type="radio" name="pago" required>
        Tarjeta
      </label>

      <label>
        <input type="radio" name="pago">
        PayPal
      </label>

      <label>
        <input type="radio" name="pago">
        Transferencia
      </label>

    </div>

    <!-- BOTÓN -->

    <button class="btn grande-btn" type="submit">

      Confirmar pedido

    </button>

  </form>

</main>

<footer class="footer">

  <div>
    <h3>MangaZone</h3>
    <p>Tienda online de mangas.</p>
  </div>

  <div>

    <h3>Links</h3>

    <a href="index.html">
      Inicio
    </a>

    <a href="categoria.html">
      Mangas
    </a>

  </div>

  <div>

    <h3>Contacto</h3>

    <p>
      info@mangazone.com
    </p>

  </div>

</footer>

</body>
</html>
